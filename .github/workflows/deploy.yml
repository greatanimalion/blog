name: CI/CD Pipeline

on:
  push:
    branches: [ main ]   # 当 main 分支有代码推送时触发

jobs:
  # 第一阶段：测试 (CI)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: 安装依赖
        run: pnpm ci
      - name: 运行测试
        run: pnpm test

  # 第二阶段：构建 (CI)
  build:
    runs-on: ubuntu-latest
    needs: test          # 等待 test 任务成功完成后再执行
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: 安装依赖
        run: pnpm ci
      - name: 打包项目
        run: pnpm run build
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist     # 给产物起个名字，供后续部署使用
          path: dist/    # 指定构建产物所在的文件夹

  # 第三阶段：部署 (CD)
  deploy:
    runs-on: ubuntu-latest
    needs: build         # 等待 build 任务成功完成后再执行
    if: github.event_name == 'push' # 仅在push事件时部署
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: 通过 SSH 部署到服务器
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "dist/"
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USERNAME }}
          TARGET: "/var/www/myapp/" # 服务器上的目标目录